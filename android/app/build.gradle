plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localProperties.load(new FileInputStream(localPropertiesFile))
}
def hasReleaseKeystore = keystoreProperties['storeFile'] != null &&
        rootProject.file(keystoreProperties['storeFile']).exists()
def appodealAppKey = (
        localProperties.getProperty('appodeal.appKey')
                ?: System.getenv('APPODEAL_APP_KEY')
                ?: 'APPODEAL_APP_KEY'
).trim()
def appnextAppId = (
        localProperties.getProperty('appnext.appId')
                ?: System.getenv('APPNEXT_APP_ID')
                ?: '1106737'
).trim()

android {
    namespace = "com.videomoney.app"
    compileSdk = flutter.compileSdkVersion

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.videomoney.app"
        minSdkVersion = 24
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        buildConfigField "String", "APPODEAL_APP_KEY", "\"${appodealAppKey}\""
        buildConfigField "String", "APPNEXT_APP_ID", "\"${appnextAppId}\""
    }
    signingConfigs {
        release {
            if (hasReleaseKeystore) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            if (hasReleaseKeystore) {
                signingConfig = signingConfigs.release
            }
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation platform("com.google.firebase:firebase-bom:33.1.2")
    implementation "com.appnext.sdk:ads:2.7.6.473"
    implementation "com.appodeal.ads.sdk:core:4.2.0"
    implementation "com.appodeal.ads.sdk.adapters:admob:24.7.0.0"
    implementation "com.appodeal.ads.sdk.adapters:iab:1.8.1.0"
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
}
