plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localProperties.load(new FileInputStream(localPropertiesFile))
}
def hasReleaseKeystore = keystoreProperties['storeFile'] != null &&
        rootProject.file(keystoreProperties['storeFile']).exists()
def appodealAppKey = (
        localProperties.getProperty('appodeal.appKey')
                ?: System.getenv('APPODEAL_APP_KEY')
                ?: 'APPODEAL_APP_KEY'
).trim()
def appnextAppId = (
        localProperties.getProperty('appnext.appId')
                ?: System.getenv('APPNEXT_APP_ID')
                ?: '1106737'
).trim()
def appnextPlacementId = (
        localProperties.getProperty('appnext.placementId')
                ?: System.getenv('APPNEXT_PLACEMENT_ID')
                ?: ''
).trim()
def metaAppId = (
        localProperties.getProperty('meta.appId')
                ?: System.getenv('META_APP_ID')
                ?: '1741013560433241'
).trim()
def metaRewardedInterstitialPlacementId = (
        localProperties.getProperty('meta.rewardedInterstitialPlacementId')
                ?: System.getenv('META_REWARDED_INTERSTITIAL_PLACEMENT_ID')
                ?: '1741013560433241_1741019903765940'
).trim()
def metaInterstitialPlacementId = (
        localProperties.getProperty('meta.interstitialPlacementId')
                ?: System.getenv('META_INTERSTITIAL_PLACEMENT_ID')
                ?: '1741013560433241_1741019900432607'
).trim()
def metaBannerPlacementId = (
        localProperties.getProperty('meta.bannerPlacementId')
                ?: System.getenv('META_BANNER_PLACEMENT_ID')
                ?: '1741013560433241_1741019897099274'
).trim()
def liftoffAppId = (
        localProperties.getProperty('liftoff.appId')
                ?: System.getenv('LIFTOFF_APP_ID')
                ?: '6a5bfc42a675fb0e69db341b'
).trim()
def liftoffRewardedPlacementId = (
        localProperties.getProperty('liftoff.rewardedPlacementId')
                ?: System.getenv('LIFTOFF_REWARDED_PLACEMENT_ID')
                ?: 'DEFAULT-8375954'
).trim()
def graviteRewardedPlacementName = (
        localProperties.getProperty('gravite.rewardedPlacementName')
                ?: System.getenv('GRAVITE_REWARDED_PLACEMENT_NAME')
                ?: 'VideoMoney_rewarded'
).trim()
def graviteTestModeAccountId = (
        localProperties.getProperty('gravite.testModeAccountId')
                ?: System.getenv('GRAVITE_TEST_MODE_ACCOUNT_ID')
                ?: ''
).trim()
def mobfoxVastTagUrl = (
        localProperties.getProperty('mobfox.vastTagUrl')
                ?: System.getenv('MOBFOX_VAST_TAG_URL')
                ?: 'https://bes.mobfox.com/?c=v&m=tag&app=1&placementId=3191&videotype=[VIDEO_TYPE]&ip=[IP]&ua=[UA]&name=[APP_NAME]&bundle=[APP_BUNDLE]&ver=[APP_VERSION]&os=[DEVICE_OS]&osv=[DEVICE_OS_VERSION]&make=[DEVICE_MAKE]&model=[DEVICE_MODEL]&w=[DEVICE_W]&h=[DEVICE_H]&wPlayer=[PLAYER_W]&hPlayer=[PLAYER_H]&hwv=[DEVICE_HW_VERSION]&ifa=[IFA]&js=[JS]&carrier=[CARRIER]&paid=[PAID]&country=[GEO_COUNTRY]&geo_type=[GEO_TYPE]&city=[GEO_CITY]&lat=[GEO_LAT]&lon=[GEO_LON]&bidfloor=[BIDFLOOR]&gdpr_consent=[GDPR_CONSENT]&coppa=[COPPA]&gpp=[GPP]&gpp_sid=[GPP_SID]'
).trim()

android {
    namespace = "com.videomoney.app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = "28.2.13676358"

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.videomoney.app"
        minSdkVersion = 25
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        buildConfigField "String", "APPODEAL_APP_KEY", "\"${appodealAppKey}\""
        buildConfigField "String", "APPNEXT_APP_ID", "\"${appnextAppId}\""
        buildConfigField "String", "APPNEXT_PLACEMENT_ID", "\"${appnextPlacementId}\""
        buildConfigField "String", "META_APP_ID", "\"${metaAppId}\""
        buildConfigField "String", "META_REWARDED_INTERSTITIAL_PLACEMENT_ID", "\"${metaRewardedInterstitialPlacementId}\""
        buildConfigField "String", "META_INTERSTITIAL_PLACEMENT_ID", "\"${metaInterstitialPlacementId}\""
        buildConfigField "String", "META_BANNER_PLACEMENT_ID", "\"${metaBannerPlacementId}\""
        buildConfigField "String", "LIFTOFF_APP_ID", "\"${liftoffAppId}\""
        buildConfigField "String", "LIFTOFF_REWARDED_PLACEMENT_ID", "\"${liftoffRewardedPlacementId}\""
        buildConfigField "String", "GRAVITE_REWARDED_PLACEMENT_NAME", "\"${graviteRewardedPlacementName}\""
        buildConfigField "String", "GRAVITE_TEST_MODE_ACCOUNT_ID", "\"${graviteTestModeAccountId}\""
        buildConfigField "String", "MOBFOX_VAST_TAG_URL", "\"${mobfoxVastTagUrl}\""
    }
    signingConfigs {
        release {
            if (hasReleaseKeystore) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            if (hasReleaseKeystore) {
                signingConfig = signingConfigs.release
            }
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation platform("com.google.firebase:firebase-bom:33.1.2")
    implementation "androidx.core:core-ktx:1.13.1"
    implementation ("com.intentsoftware.addapptr:AATKit:3.17.3") {
        transitive = true
    }
    implementation "com.google.android.ump:user-messaging-platform:3.1.0"
    implementation "androidx.media3:media3-exoplayer:1.4.1"
    implementation "androidx.media3:media3-ui:1.4.1"
    implementation "com.vungle:vungle-ads:7.7.6"
    implementation "com.facebook.android:audience-network-sdk:6.21.0"
    implementation "com.appnext.sdk:ads:2.7.6.473"
    implementation "com.appodeal.ads.sdk:core:4.2.0"
    implementation "com.appodeal.ads.sdk.adapters:admob:24.7.0.0"
    implementation "com.appodeal.ads.sdk.adapters:iab:1.8.1.0"
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
}
