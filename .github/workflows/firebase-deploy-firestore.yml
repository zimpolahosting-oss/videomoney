name: Deploy Firestore Rules

on:
  push:
    branches: [ "main" ]
    paths:
      - "firebase.json"
      - "firestore.rules"
      - ".github/workflows/firebase-deploy-firestore.yml"
  workflow_dispatch: {}

jobs:
  deploy-firestore:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - id: auth
        name: Authenticate to Google Cloud (service account key)
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure gcloud project
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          if [ -z "$FIREBASE_PROJECT_ID" ]; then
            echo "Missing secret FIREBASE_PROJECT_ID"
            exit 1
          fi
          gcloud config set project "$FIREBASE_PROJECT_ID"

      - name: Install deploy dependencies
        run: npm install firebase-admin

      - name: Deploy Firestore rules with Admin SDK
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          if [ -z "$FIREBASE_PROJECT_ID" ]; then
            echo "Missing secret FIREBASE_PROJECT_ID"
            exit 1
          fi
          if [ -z "$GOOGLE_APPLICATION_CREDENTIALS" ]; then
            echo "Missing credentials file path from auth step"
            exit 1
          fi
          node <<'NODE'
          const fs = require('fs');
          const admin = require('firebase-admin');

          const projectId = process.env.FIREBASE_PROJECT_ID;
          const source = fs.readFileSync('firestore.rules', 'utf8');

          admin.initializeApp({
            credential: admin.credential.applicationDefault(),
            projectId,
          });

          async function main() {
            await admin.securityRules().releaseFirestoreRulesetFromSource(source);
            console.log(`Firestore rules deployed for project ${projectId}`);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
