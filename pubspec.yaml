name: video_money
description: Video&Money Flutter app with Firebase Auth, Firestore and rewarded ads.
publish_to: "none"
version: 1.0.1+28

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  firebase_database: ^11.1.0
  cloud_firestore: ^5.0.2
  firebase_messaging: ^15.0.2
  flutter_secure_storage: ^9.2.2
  flutter_local_notifications: ^17.2.2
  flutter_timezone: ^4.0.0
  google_mobile_ads: ^5.1.0
  http: ^1.2.2
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  timezone: ^0.9.4
  url_launcher: ^6.3.1
  video_player: ^2.9.2
  webview_flutter: ^4.14.0
  youtube_player_iframe: ^5.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/illustrations/
